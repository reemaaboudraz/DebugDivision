name: Backend-CI

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend/ticket-backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
          cache-dependency-path: backend/ticket-backend/pom.xml
          
      - name: Write Firebase service account
        run: |
          echo '${{ secrets.FIREBASE_SECRET }}' > ./firebase-service-account.json
          chmod 600 firebase-service-account.json

      - name: Grant execute permission for mvnw
        run: chmod +x mvnw

      - name: Build & test
        env:
            FIREBASE_CREDENTIALS: firebase-service-account.json
        run: ./mvnw -B verify
